# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_parking_db
spring.datasource.username=postgres
spring.datasource.password=Nanda@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Hibernate Debug Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Server Configuration
server.port=8081
# server.servlet.context-path=/api

# Authentication Configuration
# Demo credentials - can be overridden with environment variables
auth.exit.user=exit
auth.exit.password=exit456
auth.admin.user=admin
auth.admin.password=admin789

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Cache Configuration
spring.cache.type=jcache
spring.cache.jcache.provider=org.ehcache.jsr107.EhcacheCachingProvider

# Rate Limiting Configuration (Updated for better user experience)
rate.limit.lock.requests=50
rate.limit.book.requests=30
rate.limit.view.requests=200
rate.limit.receipt.requests=50
rate.limit.general.requests=300
rate.limit.cleanup.interval=300000
rate.limit.bucket.ttl=3600000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.smartparking=DEBUG
logging.level.org.springframework.security=DEBUG

# Actuator Security Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# Disable sensitive actuator endpoints in production
management.endpoint.env.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.threaddump.enabled=false
management.endpoint.beans.enabled=false

# CORS Configuration
app.cors.allowed-origins=http://localhost:8081
