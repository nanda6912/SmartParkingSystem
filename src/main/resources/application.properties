# =============================================================================
# Smart Parking System - Base Configuration Template
# =============================================================================
# ACTIVE PROFILE SELECTION:
# Set SPRING_PROFILES_ACTIVE environment variable to 'dev' or 'prod'
# 
# Examples:
# Linux/Mac: export SPRING_PROFILES_ACTIVE=dev
# Windows: set SPRING_PROFILES_ACTIVE=prod
# =============================================================================

# Default profile (will be overridden by SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =============================================================================
# CRITICAL: Environment Variables Required for Production
# =============================================================================
# The following environment variables MUST be set for production deployment:
#
# Required:
# - DB_PASSWORD: PostgreSQL database password
# - PARKING_API_KEY: Strong API key (min 32 characters recommended)
# - SSL_KEYSTORE_PASSWORD: SSL keystore password
#
# Optional but Recommended:
# - DB_URL: Database URL (default: jdbc:postgresql://localhost:5432/smart_parking_db)
# - DB_USERNAME: Database username (default: postgres)
# - SSL_KEYSTORE_PATH: Path to SSL keystore file
# - SSL_KEY_ALIAS: SSL key alias
# - CORS_ALLOWED_ORIGINS: Comma-separated list of allowed origins
# - ENVIRONMENT: Environment tag for metrics (default: production)
#
# =============================================================================

# Placeholder to ensure required env vars are documented
# Actual configuration is loaded from profile-specific files:
# - application-dev.properties (Development)
# - application-prod.properties (Production)
