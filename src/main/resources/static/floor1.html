<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Floor Parking - Smart Parking System</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles/design-system.css">
    <style>
        /* Page-specific styles only */
        .main-container {
            display: flex;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .parking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: var(--space-2);
            padding: var(--space-4);
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
        }
        .parking-slot {
            aspect-ratio: 1;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color var(--transition-fast);
            position: relative;
            background: var(--bg-secondary);
            padding: var(--space-1);
        }
        .parking-slot:hover {
            border-color: var(--accent-primary);
        }
        .parking-slot.available:hover {
            background: var(--bg-secondary);
        }
        .parking-slot.occupied {
            border-color: #DC2626;
            color: #7F1D1D;
            background: #FEF2F2;
            cursor: not-allowed;
            font-weight: 600;
        }
        .parking-slot.locked {
            border-color: #F59E0B;
            color: #92400E;
            background: #FEF3C7;
            cursor: not-allowed;
            font-weight: 600;
        }
        .slot-id {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: var(--space-1);
        }
        .slot-status {
            font-size: 0.625rem;
            opacity: 0.8;
        }
        .lock-timer {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #F59E0B;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .floor-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }
        .floor-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }
        .floor-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-3);
        }
        .stat-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: var(--space-1);
        }
        .navigation {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            margin-bottom: var(--space-4);
        }
        .nav-buttons {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: var(--space-2) var(--space-4);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all var(--transition-fast);
        }
        .nav-btn:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        .nav-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-8);
            color: var(--text-secondary);
        }
        .skeleton {
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-primary) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-slot {
            aspect-ratio: 1;
            margin: var(--space-1);
        }
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border: none;
            width: 90%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            animation: modalSlideIn 0.3s ease-out;
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 {
            margin: 0;
            color: var(--text-primary);
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .close-btn:hover {
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-primary);
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary {
            background-color: var(--accent-primary);
            color: white;
        }
        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
        }
        .error {
            color: #DC2626;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="content-area" style="flex: 1; padding: var(--space-6);">
            
            <!-- Floor Header -->
            <div class="floor-header">
                <h1 class="floor-title">🚗 First Floor Parking</h1>
                <div class="floor-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalSlots">0</div>
                        <div class="stat-label">Total Slots</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="availableSlots">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="lockedSlots">0</div>
                        <div class="stat-label">Locked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="occupiedSlots">0</div>
                        <div class="stat-label">Occupied</div>
                    </div>
                </div>
            </div>

            <!-- Parking Grid -->
            <div id="parkingGridFloor1" class="parking-grid">
                <div class="loading">Loading First Floor parking slots...</div>
            </div>
        </div>
    </div>

    <!-- Booking Modal (copied from index.html) -->
    <div id="bookingModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Book Parking Slot</h2>
                <button class="close-btn" onclick="parkingApp.closeBookingForm()">&times;</button>
            </div>
            <form id="bookingFormElement">
                <div class="form-group">
                    <label for="slotId">Slot ID:</label>
                    <input type="text" id="slotId" readonly>
                </div>
                <div class="form-group">
                    <label for="vehicleNumber">Vehicle Number:</label>
                    <input type="text" id="vehicleNumber" required pattern="^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$" placeholder="XX00XX0000">
                    <div class="error" id="vehicleNumberError"></div>
                </div>
                <div class="form-group">
                    <label for="customerName">Customer Name:</label>
                    <input type="text" id="customerName" required pattern="^[A-Za-z\s]+$" placeholder="John Doe">
                    <div class="error" id="customerNameError"></div>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number:</label>
                    <input type="tel" id="phoneNumber" required pattern="^[0-9]{10}$" placeholder="9876543210">
                    <div class="error" id="phoneNumberError"></div>
                </div>
                <div class="form-group">
                    <label for="vehicleType">Vehicle Type:</label>
                    <select id="vehicleType" required>
                        <option value="">Select Vehicle Type</option>
                        <option value="CAR">Car</option>
                        <option value="BIKE">Bike</option>
                        <option value="SUV">SUV</option>
                        <option value="VAN">Van</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Book Slot</button>
                    <button type="button" class="btn btn-secondary" onclick="parkingApp.closeBookingForm()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        class FloorParkingApp {
            constructor() {
                this.slots = [];
                this.selectedSlot = null;
                this.lockTimers = {};
                this.floorNumber = 2; // First floor is floor 2 in the database (AF01 slots)
                this.init();
            }

            async init() {
                this.setupEventListeners();
                await this.loadParkingSlots();
                this.startLockTimers();
            }

            setupEventListeners() {
                // Modal backdrop click to close
                document.getElementById('bookingModal').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        this.closeBookingForm();
                    }
                });
                
                document.getElementById('bookingFormElement').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.submitBooking();
                });
                ['vehicleNumber', 'customerName', 'phoneNumber'].forEach(fieldId => {
                    document.getElementById(fieldId).addEventListener('input', (e) => {
                        this.validateField(fieldId);
                    });
                });
            }

            async loadParkingSlots() {
                try {
                    this.showSkeletonLoader();
                    
                    const response = await fetch(`/api/parking-slots/floor/${this.floorNumber}`);
                    
                    if (!response.ok) {
                        if (response.status === 429) {
                            await new Promise(resolve => setTimeout(resolve, 2000));
                            const retryResponse = await fetch(`/api/parking-slots/floor/${this.floorNumber}`);
                            if (!retryResponse.ok) {
                                throw new Error(`HTTP error after retry! status: ${retryResponse.status}`);
                            }
                            return await retryResponse.json();
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                    this.slots = data;
                    this.renderFloor(data, 'parkingGridFloor1');
                    this.updateStats();
                    this.startLockTimers();
                } catch (error) {
                    this.showNotification(`Error loading First Floor parking slots: ${error.message}`, 'error');
                } finally {
                    this.hideLoading();
                }
            }

            renderFloor(slots, gridId) {
                const grid = document.getElementById(gridId);
                if (!grid) {
                    console.error(`Grid element not found: ${gridId}`);
                    return;
                }
                grid.innerHTML = '';
                slots.forEach(slot => {
                    const slotElement = document.createElement('div');
                    slotElement.className = `parking-slot ${slot.status.toLowerCase()}`;
                    slotElement.dataset.slotId = slot.id;
                    let timerHtml = '';
                    if (slot.status === 'LOCKED' && slot.remainingLockSeconds > 0) {
                        timerHtml = `<div class="lock-timer">${Math.ceil(slot.remainingLockSeconds)}s</div>`;
                    }
                    if (slot.status === 'AVAILABLE') {
                        slotElement.addEventListener('click', () => this.selectSlot(slot));
                    }
                    slotElement.innerHTML = `
                        <div class="slot-id">${slot.slotId || slot.id}</div>
                        <div class="slot-status">${slot.status}</div>
                        ${timerHtml}
                    `;
                    grid.appendChild(slotElement);
                });
            }

            updateStats() {
                const total = this.slots.length;
                const available = this.slots.filter(s => s.status === 'AVAILABLE').length;
                const locked = this.slots.filter(s => s.status === 'LOCKED').length;
                const occupied = this.slots.filter(s => s.status === 'OCCUPIED').length;
                document.getElementById('totalSlots').textContent = total;
                document.getElementById('availableSlots').textContent = available;
                document.getElementById('lockedSlots').textContent = locked;
                document.getElementById('occupiedSlots').textContent = occupied;
            }

            async selectSlot(slot) {
                try {
                    this.showLoading();
                    const response = await fetch(`/api/parking-slots/lock/${slot.id}`, {
                        method: 'POST'
                    });
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
                    }
                    const result = await response.json();
                    
                    if (result.slotStatus === 'LOCKED') {
                        this.selectedSlot = slot;
                        this.showBookingForm();
                    } else {
                        this.showNotification(result.message || 'Failed to lock slot', 'error');
                    }
                } catch (error) {
                    console.error('Error selecting slot:', error);
                    this.showNotification(`Error selecting slot: ${error.message}`, 'error');
                } finally {
                    this.hideLoading();
                }
            }

            showBookingForm() {
                if (!this.selectedSlot) return;
                document.getElementById('slotId').value = this.selectedSlot.slotId || this.selectedSlot.id;
                const modal = document.getElementById('bookingModal');
                modal.style.display = 'block';
                // Prevent body scroll when modal is open
                document.body.style.overflow = 'hidden';
            }

            closeBookingForm() {
                document.getElementById('bookingModal').style.display = 'none';
                document.getElementById('bookingFormElement').reset();
                this.clearErrors();
                // Restore body scroll when modal is closed
                document.body.style.overflow = 'auto';
            }

            async submitBooking() {
                if (!this.validateForm()) {
                    return;
                }

                const bookingData = {
                    slotId: this.selectedSlot.id,
                    vehicleNumber: document.getElementById('vehicleNumber').value.trim(),
                    customerName: document.getElementById('customerName').value.trim(),
                    phoneNumber: document.getElementById('phoneNumber').value.trim(),
                    vehicleType: document.getElementById('vehicleType').value
                };

                try {
                    this.showLoading();
                    const response = await fetch('/api/parking-slots/book', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(bookingData)
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const result = await response.json();
                    console.log('Booking result:', result);
                    if (result.bookingCode) {
                        this.showNotification(`Booking confirmed! Slot ${result.slotIdString || result.slotNumber} booked successfully.`, 'success', result.bookingCode, true);
                        this.closeBookingForm();
                        // Download booking confirmation text file
                        this.downloadBookingConfirmation(result);
                        // Notify exit page about new booking
                        this.notifyExitPage(result);
                        try {
                            await new Promise(resolve => setTimeout(resolve, 500));
                            await this.loadParkingSlots();
                        } catch (loadError) {
                            console.warn('Error reloading slots after booking:', loadError);
                        }
                        if (this.lockTimers[this.selectedSlot.id]) {
                            clearInterval(this.lockTimers[this.selectedSlot.id]);
                            delete this.lockTimers[this.selectedSlot.id];
                        }
                    } else {
                        this.showNotification(result.message || 'Booking failed', 'error');
                    }
                } catch (error) {
                    console.error('Error submitting booking:', error);
                    this.showNotification(`Error submitting booking: ${error.message}`, 'error');
                } finally {
                    this.hideLoading();
                }
            }

            validateForm() {
                let isValid = true;
                ['vehicleNumber', 'customerName', 'phoneNumber'].forEach(fieldId => {
                    if (!this.validateField(fieldId)) {
                        isValid = false;
                    }
                });
                return isValid;
            }

            validateField(fieldId) {
                const field = document.getElementById(fieldId);
                const errorElement = document.getElementById(`${fieldId}Error`);
                let isValid = true;
                let errorMessage = '';

                if (fieldId === 'vehicleNumber') {
                    const pattern = /^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$/;
                    if (!field.value.trim()) {
                        errorMessage = 'Vehicle number is required';
                        isValid = false;
                    } else if (!pattern.test(field.value.trim().toUpperCase())) {
                        errorMessage = 'Vehicle number must be in format: XX00XX0000';
                        isValid = false;
                    }
                } else if (fieldId === 'customerName') {
                    const pattern = /^[A-Za-z\s]+$/;
                    if (!field.value.trim()) {
                        errorMessage = 'Customer name is required';
                        isValid = false;
                    } else if (!pattern.test(field.value.trim())) {
                        errorMessage = 'Name must contain only alphabets';
                        isValid = false;
                    }
                } else if (fieldId === 'phoneNumber') {
                    const pattern = /^[0-9]{10}$/;
                    if (!field.value.trim()) {
                        errorMessage = 'Phone number is required';
                        isValid = false;
                    } else if (!pattern.test(field.value.trim())) {
                        errorMessage = 'Phone number must be exactly 10 digits';
                        isValid = false;
                    }
                }

                errorElement.textContent = errorMessage;
                field.style.borderColor = isValid ? '' : '#DC2626';
                return isValid;
            }

            clearErrors() {
                ['vehicleNumber', 'customerName', 'phoneNumber'].forEach(fieldId => {
                    document.getElementById(`${fieldId}Error`).textContent = '';
                    document.getElementById(fieldId).style.borderColor = '';
                });
            }

            startLockTimers() {
                Object.keys(this.lockTimers).forEach(timerId => {
                    clearInterval(this.lockTimers[timerId]);
                });
                this.lockTimers = {};

                this.slots.forEach(slot => {
                    if (slot.status === 'LOCKED' && slot.remainingLockSeconds > 0) {
                        this.startLockTimer(slot);
                    }
                });
            }

            startLockTimer(slot) {
                let remainingSeconds = slot.remainingLockSeconds;
                this.lockTimers[slot.id] = setInterval(() => {
                    remainingSeconds--;
                    if (remainingSeconds <= 0) {
                        clearInterval(this.lockTimers[slot.id]);
                        delete this.lockTimers[slot.id];
                        this.loadParkingSlots();
                    } else {
                        const slotElement = document.querySelector(`[data-slot-id="${slot.id}"] .lock-timer`);
                        if (slotElement) {
                            slotElement.textContent = `${Math.ceil(remainingSeconds)}s`;
                        }
                    }
                }, 1000);
            }

            showSkeletonLoader() {
                const grid = document.getElementById('parkingGridFloor1');
                grid.innerHTML = '';
                for (let i = 0; i < 300; i++) {
                    const skeleton = document.createElement('div');
                    skeleton.className = 'parking-slot skeleton skeleton-slot';
                    grid.appendChild(skeleton);
                }
            }

            showLoading() {
                document.body.style.cursor = 'wait';
            }

            hideLoading() {
                document.body.style.cursor = 'default';
            }

            showNotification(message, type = 'info', bookingCode = null, autoHide = true) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 16px 24px;
                    border-radius: 8px;
                    color: white;
                    font-weight: 500;
                    z-index: 10000;
                    max-width: 400px;
                    word-wrap: break-word;
                    background: ${type === 'success' ? '#10B981' : type === 'error' ? '#DC2626' : '#3B82F6'};
                    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                `;
                
                let content = message;
                if (bookingCode) {
                    content += `<br><strong>Booking Code: ${bookingCode}</strong>`;
                }
                notification.innerHTML = content;
                
                document.body.appendChild(notification);
                
                if (autoHide) {
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 5000);
                }
                
                return notification;
            }

            notifyExitPage(bookingResult) {
                // Send notification to exit page about new booking
                try {
                    const message = {
                        type: 'new_booking',
                        timestamp: Date.now(),
                        data: {
                            bookingCode: bookingResult.bookingCode,
                            vehicleNumber: bookingResult.vehicleNumber,
                            customerName: bookingResult.customerName,
                            slotNumber: bookingResult.slotNumber,
                            entryTime: bookingResult.entryTime
                        }
                    };
                    // Use BroadcastChannel for real-time communication
                    const channel = new BroadcastChannel('parking_updates');
                    channel.postMessage(message);
                    channel.close();
                    console.log('Notified exit page about new booking:', message);
                    // Also set localStorage as fallback
                    localStorage.setItem('newBooking', JSON.stringify({
                        ...message,
                        timestamp: Date.now()
                    }));
                } catch (error) {
                    console.log('BroadcastChannel not supported, using localStorage only');
                    // Fallback to localStorage only
                    localStorage.setItem('newBooking', JSON.stringify({
                        type: 'new_booking',
                        timestamp: Date.now(),
                        data: {
                            bookingCode: bookingResult.bookingCode,
                            vehicleNumber: bookingResult.vehicleNumber,
                            customerName: bookingResult.customerName,
                            slotNumber: bookingResult.slotNumber,
                            entryTime: bookingResult.entryTime
                        }
                    }));
                }
            }

            downloadBookingConfirmation(bookingResult) {
                try {
                    // Create booking confirmation text content
                    const confirmationText = `
PARKING BOOKING CONFIRMATION
=============================

Booking Details:
----------------
Booking Code: ${bookingResult.bookingCode}
Slot Number: ${bookingResult.slotIdString || bookingResult.slotNumber}
Vehicle Number: ${bookingResult.vehicleNumber}
Customer Name: ${bookingResult.customerName}
Vehicle Type: ${bookingResult.vehicleType}
Date: ${new Date().toLocaleDateString()}
Time: ${new Date().toLocaleTimeString()}

Floor: First Floor
Status: CONFIRMED

Important Notes:
--------------
- Please arrive 10 minutes before your booking time
- Keep this booking confirmation for your records
- Display booking code at entry for quick processing
- For assistance, contact parking support

Thank you for choosing Smart Parking System!
                    `;

                    // Create and download text file
                    const blob = new Blob([confirmationText], { type: 'text/plain' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `booking-confirmation-${bookingResult.bookingCode}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    this.showNotification('Booking confirmation downloaded successfully!', 'success');
                } catch (error) {
                    console.error('Error downloading booking confirmation:', error);
                    this.showNotification('Failed to download booking confirmation', 'error');
                }
            }
        }

        // Initialize the app
        const parkingApp = new FloorParkingApp();
    </script>
</body>
</html>
