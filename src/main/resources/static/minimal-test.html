<!DOCTYPE html>
<html>
<head>
    <title>Minimal Test</title>
</head>
<body>
    <h1>Minimal API Test</h1>
    <div id="result"></div>
    
    <script>
        // Test 1: Direct fetch
        fetch('http://localhost:8081/api/exit/active-bookings')
            .then(response => {
                console.log('Response:', response);
                return response.json();
            })
            .then(data => {
                console.log('Data:', data);
                document.getElementById('result').innerHTML = `
                    <h2>Success!</h2>
                    <p>Found ${data.length} bookings</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `
                    <h2>Error!</h2>
                    <p>${error.message}</p>
                `;
            });
    </script>
</body>
</html>
