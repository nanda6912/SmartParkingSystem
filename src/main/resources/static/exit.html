<!DOCTYPE html>



<html lang="en">



<head>



    <meta charset="UTF-8">



    <meta name="viewport" content="width=device-width, initial-scale=1.0">



    <title>Vehicle Exit Management - Smart Parking System</title>



    <link rel="stylesheet" href="/styles/design-system.css">



    <style>



        /* Page-specific styles */



        .main-container {

            display: flex;

            min-height: 100vh;

            gap: var(--space-6);

            padding: var(--space-6);

        }



        .left-section {

            flex: 1;

            min-width: 0;

        }



        .right-section {

            flex: 1;

            min-width: 0;

            display: flex;

            flex-direction: column;

            gap: var(--space-6);

        }



        .content-area {

            flex: 1;



            display: flex;



            flex-direction: column;



        }



        



        .page-header {



            background: var(--bg-secondary);



            border-bottom: 1px solid var(--border-primary);



            padding: var(--space-6);



            margin-bottom: var(--space-6);



        }



        



        .page-title {



            font-size: var(--font-size-2xl);



            font-weight: 700;



            color: var(--text-primary);



            margin-bottom: var(--space-2);



            font-family: 'Cambria', serif;



            font-weight: bold;



        }



        



        .page-subtitle {



            color: var(--text-secondary);



            font-size: var(--font-size-base);



            font-family: 'Cambria', serif;



        }



        



        .stats-grid {



            display: grid;



            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));



            gap: var(--space-4);



            margin-bottom: var(--space-6);



        }



        



        .stat-card {



            background: var(--bg-secondary);



            border: 1px solid var(--border-primary);



            border-radius: var(--radius-md);



            padding: var(--space-5);



            text-align: center;



            transition: var(--transition-base);



        }



        



        .stat-card:hover {



            transform: translateY(-1px);



            box-shadow: var(--shadow-md);



        }



        



        .stat-value {



            font-size: var(--font-size-3xl);



            font-weight: 700;



            color: var(--accent-primary);



            margin-bottom: var(--space-2);



        }



        



        .stat-label {



            font-size: var(--font-size-sm);



            color: var(--text-tertiary);



            text-transform: uppercase;



            letter-spacing: 0.05em;



        }



        



        .table-container {



            background: var(--bg-secondary);



            border: 1px solid var(--border-primary);



            border-radius: var(--radius-md);



            overflow: hidden;



            margin-bottom: var(--space-6);



        }



        



        .table-header {



            background: var(--bg-tertiary);



            padding: var(--space-4) var(--space-6);



            border-bottom: 1px solid var(--border-primary);



            display: flex;



            justify-content: space-between;



            align-items: center;



        }



        



        .table-title {



            font-size: var(--font-size-lg);



            font-weight: 600;



            color: var(--text-primary);



        }



        



        .refresh-btn {



            background: var(--btn-primary);



            color: var(--text-inverse);



            border: none;



            padding: var(--space-2) var(--space-4);



            border-radius: var(--radius-sm);



            cursor: pointer;



            font-size: var(--font-size-sm);



            transition: var(--transition-fast);



        }



        



        .refresh-btn:hover {



            background: var(--btn-primary-hover);



        }



        



        .modal-overlay {



            display: none;



            position: fixed;



            top: 0;



            left: 0;



            width: 100%;



            height: 100%;



            background: rgba(0, 0, 0, 0.5);



            z-index: 1000;



            align-items: center;



            justify-content: center;



        }



        



        .modal-overlay.open {



            display: flex;



        }



        



        .modal-content {



            background: var(--bg-secondary);



            border-radius: var(--radius-lg);



            width: 90%;



            max-width: 500px;



            max-height: 90vh;



            overflow-y: auto;



        }



        



        .empty-state {



            text-align: center;



            padding: var(--space-16) var(--space-8);



            color: var(--text-tertiary);



        }



        



        .empty-state-icon {



            width: 120px;



            height: 120px;



            margin: 0 auto var(--space-6);



            opacity: 0.3;



        }



        



        .empty-state-title {



            font-size: var(--font-size-lg);



            font-weight: 600;



            color: var(--text-secondary);



            margin-bottom: var(--space-3);



        }





        .revenue-block {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            text-align: center;
            margin-bottom: var(--space-6);
            box-shadow: var(--shadow-lg);
        }

        .revenue-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin-bottom: var(--space-2);
            opacity: 0.9;
        }

        .revenue-amount {
            font-size: var(--font-size-4xl);
            font-weight: 700;
            margin-bottom: var(--space-2);
        }

        .revenue-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.8;
        }

        .released-vehicles {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            flex: 1;
            overflow-y: auto;
        }

        .released-vehicles h3 {
            color: var(--text-primary);
            margin-bottom: var(--space-4);
            font-size: var(--font-size-xl);
            font-weight: 600;
        }

        .vehicle-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-secondary);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-3);
            transition: var(--transition-base);
        }

        .vehicle-item:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .vehicle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
            padding-bottom: var(--space-2);
            border-bottom: 1px solid var(--border-secondary);
        }

        .vehicle-number {
            font-weight: 600;
            color: var(--accent-primary);
            font-size: var(--font-size-lg);
        }

        .vehicle-time {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        .vehicle-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-2);
            font-size: var(--font-size-sm);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: var(--font-size-xs);
            margin-bottom: var(--space-1);
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .fare-amount {
            color: var(--accent-success);
            font-weight: 700;
            font-size: var(--font-size-lg);
        }

        .active-bookings-inline {
            background: var(--bg-primary);
            border: 1px solid var(--border-secondary);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            margin-top: var(--space-3);
        }

        .active-bookings-inline h4 {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }

        .booking-slot {
            display: inline-block;
            background: var(--accent-primary);
            color: white;
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            margin-right: var(--space-2);
            margin-bottom: var(--space-1);
        }

        



        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }


    </style>



</head>



<body>



    <!-- Progress Bar -->



    <div class="progress-bar" id="progressBar" style="display: none;">



        <div class="progress-bar-fill" id="progressBarFill"></div>



    </div>







    <!-- Authentication Check -->



    <script>



        // Check if user is authenticated for exit access



        console.log('Exit page - checking authentication...');



        const exitAuth = sessionStorage.getItem('exitAuthenticated');



        console.log('Exit authentication status:', exitAuth);



        



        if (!exitAuth) {



            console.log('Not authenticated, redirecting to auth.html');



            window.location.href = '/auth.html';



        } else {

    <div class="main-container">
        
        <!-- Left Section: Exit Page -->
        <div class="left-section">
            <main class="main-content-full">
                <!-- Page Header -->
                <div class="page-header">
                    <h1 class="page-title">Vehicle Exit Management</h1>
                    <p class="page-subtitle">Process vehicle exits and calculate parking fees</p>
                    <div style="margin-top: var(--space-4);">

                    </div>
                </div>

                <!-- Statistics Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="todayExits">0</div>

                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeBookings">0</div>

                    </div>
                </div>

                <!-- Active Bookings Table -->
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">🅿️ Active Bookings</h2>
                        <button class="refresh-btn" onclick="loadActiveBookings()">🔄 Refresh</button>
                    </div>

                <div id="activeBookingsContent">



                    <!-- Table will be populated here -->



                </div>



            </div>



        </main>



    </div>
        
        <!-- Right Section: Revenue and Released Vehicles -->
        <div class="right-section">
            <!-- Total Revenue Block -->
            <div class="revenue-block">
                <div class="revenue-title">💰 Today's Total Revenue</div>

                <div class="revenue-subtitle">From vehicle exits</div>
            </div>
            
            <!-- Released Vehicles Section -->

                    </div>

    </div>




    <!-- Modal Overlay -->



    <div class="modal-overlay" id="feeModal">



        <div class="modal">



            <div class="modal-header">



                <h2 class="modal-title">Parking Fee Calculation</h2>



                <button class="modal-close" onclick="closeFeeModal()">&times;</button>



            </div>



            <div class="modal-body" id="feeModalBody">



                <!-- Fee details will be populated here -->



            </div>



            <div class="modal-footer">



                <button type="button" class="btn btn-secondary" onclick="closeFeeModal()">Cancel</button>



                <button type="button" class="btn btn-primary" id="processExitBtn" onclick="processExit()">Process Exit</button>



            </div>



        </div>



    </div>







    <!-- Notification -->



    <div class="notification" id="notification"></div>







    <script>



        class ExitManagement {



            constructor() {



                this.currentBookingId = null;



                this.init();



            }







            init() {



                this.loadActiveBookings();



                this.loadStatistics();



                // Auto-refresh every 30 seconds



                setInterval(() => {



                    this.loadActiveBookings();



                    this.loadStatistics();



                }, 30000);



            }







            async loadActiveBookings() {



                try {



                    this.showSkeletonLoader();



                    this.showProgressBar();



                    const response = await fetch('/api/exit/active-bookings');



                    



                    if (!response.ok) {



                        throw new Error(`HTTP error! status: ${response.status}`);



                    }



                    



                    const bookings = await response.json();



                    this.renderBookings(bookings);



                } catch (error) {



                    console.error('Error loading active bookings:', error);



                    this.showNotification('Error loading bookings: ' + error.message, 'error');



                } finally {



                    this.hideProgressBar();



                }



            }







            async loadStatistics() {



                try {



                    const response = await fetch('/api/sync/exit/data');



                    



                    if (!response.ok) {



                        throw new Error(`HTTP error! status: ${response.status}`);



                    }



                    



                    const stats = await response.json();



                    this.updateStatistics(stats);



                } catch (error) {



                    console.error('Error loading statistics:', error);



                }



            }







            renderBookings(bookings) {



                const content = document.getElementById('activeBookingsContent');



                



                if (bookings.length === 0) {



                    content.innerHTML = `



                        <div class="empty-state">



                            <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">



                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />



                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 21v-2a4 4 0 00-4-4H5" />



                            </svg>



                            <div class="empty-state-title">No Active Bookings</div>



                            <div class="empty-state-description">There are currently no vehicles parked in the system.</div>



                        </div>



                    `;



                    return;



                }



                



                content.innerHTML = `



                    <table class="table">



                        <thead>



                            <tr>



                                <th>Booking Code</th>



                                <th>Vehicle Number</th>



                                <th>Customer Name</th>



                                <th>Slot</th>



                                <th>Entry Time</th>



                                <th>Duration</th>



                                <th>Actions</th>



                            </tr>



                        </thead>



                        <tbody>



                            ${bookings.map(booking => this.createBookingRow(booking)).join('')}



                        </tbody>



                    </table>



                `;



            }







            createBookingRow(booking) {



                return `



                    <tr>



                        <td><strong>${booking.bookingCode}</strong></td>



                        <td>${booking.vehicleNumber}</td>



                        <td>${booking.customerName}</td>



                        <td><span class="status-badge status-available">F${booking.floor}-S${booking.slotNumber}</span></td>



                        <td>${booking.bookingTime}</td>



                        <td>${booking.durationMinutes} min</td>



                        <td>



                            <button class="btn btn-sm btn-primary" onclick="calculateFee(${booking.bookingId})">



                                💰 Calculate Fee



                            </button>



                        </td>



                    </tr>



                `;



            }







            updateStatistics(stats) {
                document.getElementById('todayExits').textContent = stats.todayExits || 0;
                document.getElementById('activeBookings').textContent = stats.activeBookings || 0;
                
                // Update total revenue
                const totalRevenue = stats.totalRevenue || 0;
                document.getElementById('totalRevenue').textContent = `₹${totalRevenue.toFixed(2)}`;
                
                // Update released vehicles list
                this.updateReleasedVehicles(stats.todayExitsData || []);
            }
            
            updateReleasedVehicles(exitsData) {
                const container = document.getElementById('releasedVehiclesList');
                
                if (!exitsData || exitsData.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-title">No vehicles released yet today</div>
                        </div>
                    `;
                    return;
                }
                
                const vehiclesHtml = exitsData.map(exit => `
                    <div class="vehicle-item">
                        <div class="vehicle-header">
                            <div class="vehicle-number">${exit.vehicleNumber || 'N/A'}</div>
                            <div class="vehicle-time">${this.formatTime(exit.exitTime)}</div>
                        </div>
                        <div class="vehicle-details">
                            <div class="detail-item">
                                <div class="detail-label">Entry Time</div>
                                <div class="detail-value">${this.formatTime(exit.entryTime)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Slot Number</div>
                                <div class="detail-value">${exit.slotNumber || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Duration</div>
                                <div class="detail-value">${exit.duration || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Fare Charged</div>
                                <div class="detail-value fare-amount">₹${exit.totalFee || 0}</div>
                            </div>
                        </div>
                        ${exit.activeBookings && exit.activeBookings.length > 0 ? `
                            <div class="active-bookings-inline">
                                <h4>Active Bookings Slot:</h4>
                                ${exit.activeBookings.map(booking => `
                                    <span class="booking-slot">${booking.slotNumber || 'N/A'}</span>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('');
                
                container.innerHTML = vehiclesHtml;
            }
            
            formatTime(timeString) {
                if (!timeString) return 'N/A';
                try {
                    const date = new Date(timeString);
                    return date.toLocaleTimeString('en-IN', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        hour12: true 
                    });
                } catch (error) {
                    return timeString;
                }
            }




            async calculateFee(bookingId) {



                try {



                    this.currentBookingId = bookingId;



                    this.showLoading();



                    



                    const response = await fetch(`/api/exit/calculate-fee/${bookingId}`);



                    



                    if (!response.ok) {



                        throw new Error(`HTTP error! status: ${response.status}`);



                    }



                    



                    const feeDetails = await response.json();



                    



                    // Store the complete booking details for later use



                    this.currentBookingDetails = {



                        bookingId: bookingId,



                        bookingCode: feeDetails.bookingCode,



                        vehicleNumber: feeDetails.vehicleNumber,



                        customerName: feeDetails.customerName,



                        phoneNumber: feeDetails.phoneNumber,



                        vehicleType: feeDetails.vehicleType,



                        entryTime: feeDetails.entryTime,



                        slotNumber: feeDetails.slotNumber,



                        floor: feeDetails.floor,



                        duration: feeDetails.duration,



                        totalFee: feeDetails.totalFee,



                        hoursCharged: feeDetails.hoursCharged



                    };



                    



                    console.log('=== BOOKING DETAILS STORED ===');



                    console.log('Stored booking details:', this.currentBookingDetails);




                    



                    this.showFeeModal(feeDetails);



                } catch (error) {



                    console.error('Error calculating fee:', error);



                    this.showNotification('Error calculating fee: ' + error.message, 'error');



                } finally {



                    this.hideLoading();



                }



            }







            showFeeModal(feeDetails) {



                const modal = document.getElementById('feeModal');



                const feeModalBody = document.getElementById('feeModalBody');



                



                feeModalBody.innerHTML = `



                    <div style="display: grid; gap: var(--space-4);">



                        <div style="display: flex; justify-content: space-between; padding: var(--space-3); background: var(--bg-tertiary); border-radius: var(--radius-sm);">



                            <span style="font-weight: 600; color: var(--text-secondary);">Booking Code:</span>



                            <span style="font-weight: 700; color: var(--text-primary);">${feeDetails.bookingCode}</span>



                        </div>



                        <div style="display: flex; justify-content: space-between; padding: var(--space-3); background: var(--bg-tertiary); border-radius: var(--radius-sm);">



                            <span style="font-weight: 600; color: var(--text-secondary);">Vehicle Number:</span>



                            <span style="font-weight: 700; color: var(--text-primary);">${feeDetails.vehicleNumber}</span>



                        </div>



                        <div style="display: flex; justify-content: space-between; padding: var(--space-3); background: var(--bg-tertiary); border-radius: var(--radius-sm);">



                            <span style="font-weight: 600; color: var(--text-secondary);">Entry Time:</span>



                            <span style="font-weight: 700; color: var(--text-primary);">${feeDetails.entryTime}</span>



                        </div>



                        <div style="display: flex; justify-content: space-between; padding: var(--space-3); background: var(--bg-tertiary); border-radius: var(--radius-sm);">



                            <span style="font-weight: 600; color: var(--text-secondary);">Duration:</span>



                            <span style="font-weight: 700; color: var(--text-primary);">${feeDetails.duration}</span>



                        </div>



                        <div style="display: flex; justify-content: space-between; padding: var(--space-4); background: var(--status-available-bg); border: 1px solid var(--status-available-border); border-radius: var(--radius-sm);">



                            <span style="font-weight: 600; color: var(--status-available-text);">Total Fee:</span>



                            <span style="font-weight: 700; color: var(--status-available-text); font-size: var(--font-size-xl);">₹${feeDetails.totalFee}</span>



                        </div>



                    </div>



                `;



                



                modal.classList.add('open');



            }







            async processExit() {



                console.log('processExit method called');



                console.log('Current booking ID:', this.currentBookingId);



                



                if (!this.currentBookingId) {
                    console.log('No current booking ID - returning');
                    return;
                }
                
                // Check if this booking has already been processed
                const processedKey = `exit_processed_${this.currentBookingId}`;
                const alreadyProcessed = sessionStorage.getItem(processedKey);
                if (alreadyProcessed) {
                    console.log('Booking already processed - preventing duplicate exit');
                    this.showNotification('This booking has already been processed', 'warning');
                    return;
                }



                // Show confirmation dialog



                const confirmed = confirm(`Are you sure you want to release the vehicle for booking ${this.currentBookingId}? This action cannot be undone.`);



                console.log('User confirmed:', confirmed);



                



                if (!confirmed) {



                    console.log('User cancelled - returning');



                    return; // Staff cancelled the operation



                }



                



                try {



                    this.showLoading();



                    console.log('Sending request to process exit...');



                    



                    const response = await fetch(`/api/sync/exit/process/${this.currentBookingId}`, {



                        method: 'POST'



                    });



                    



                    console.log('Response status:', response.status);



                    



                    if (!response.ok) {



                        throw new Error(`HTTP error! status: ${response.status}`);



                    }



                    



                    const result = await response.json();
                    
                    console.log('Process result:', result);
                    console.log('Result success:', result.success);
                    console.log('Result keys:', Object.keys(result));

                    // Extract exit details from nested structure
                    const exitDetails = result.exitDetails || result;
                    console.log('Extracted exitDetails:', exitDetails);

                    if (result.success && exitDetails) {
                        // Store booking details for receipt BEFORE notifying
                        this.currentBookingCode = exitDetails.bookingCode;
                        this.currentBookingId = exitDetails.bookingId;
                        
                        // Store the complete exit details for receipt
                        this.currentBookingDetails = exitDetails;

                        



                        // Create detailed exit data with COMPLETE booking information

                        const exitData = {
                            bookingId: exitDetails.bookingId,
                            bookingCode: exitDetails.bookingCode || 'N/A',
                            processedAt: new Date().toISOString(),
                            exitTime: new Date().toLocaleString('en-US', { 
                                hour: '2-digit', 
                                minute: '2-digit',
                                hour12: true 
                            }),
                            // Use stored booking details (original data from booking)
                            vehicleNumber: exitDetails.vehicleNumber || 'Unknown',
                            customerName: exitDetails.customerName || 'Unknown',
                            phoneNumber: exitDetails.phoneNumber || 'Unknown',
                            vehicleType: exitDetails.vehicleType || 'Unknown',
                            slotNumber: exitDetails.slotNumber || 'Unknown',
                            floor: exitDetails.floor || 'Unknown',
                            totalFee: exitDetails.totalFee || 0,
                            entryTime: exitDetails.entryTime || 'Unknown',
                            duration: exitDetails.duration || 'Unknown',
                            hoursCharged: exitDetails.hoursCharged || 0
                        };


                        
                        



                        console.log('=== REAL EXIT DATA BEING STORED ===');



                        console.log('Exit data:', exitData);



                        console.log('=== END REAL EXIT DATA ===');



                        



                        // Store the exit data for records



                        localStorage.setItem('latestExitData', JSON.stringify(exitData));



                        



                        // Close fee modal (but preserve booking data)



                        this.closeFeeModalWithoutClearing();





        // Show release confirmation with receipt options
                        this.showReleaseConfirmation(exitDetails);

                        // Update booking lists and statistics
                        this.loadActiveBookings();

            notifyAdminPageUpdate() {

                console.log('=== notifyAdminPageUpdate called ===');

                console.log('Current booking ID:', this.currentBookingId);

                console.log('Current booking code:', this.currentBookingCode);

                

                if (!this.currentBookingId) {

                    console.error('No currentBookingId set, cannot notify admin page');

                    return;

                }

                

                // Prevent multiple notifications for the same exit

                const notificationKey = `exit_notified_${this.currentBookingId}`;

                const alreadyNotified = sessionStorage.getItem(notificationKey);

                

                if (alreadyNotified) {

                    console.log('=== EXIT ALREADY NOTIFIED, SKIPPING DUPLICATE NOTIFICATION ===');

                    return;

                }

                

                // Get the real exit data that was already stored

                const storedExitData = localStorage.getItem('latestExitData');

                let exitData;

                

                if (storedExitData) {

                    try {

                        exitData = JSON.parse(storedExitData);

                        console.log('Using stored real exit data:', exitData);

                    } catch (error) {

                        console.error('Error parsing stored exit data:', error);

                        exitData = null;

                    }

                }

                

                // Create a single, clean notification message

                const message = {

                    type: 'vehicle_exit',

                    timestamp: Date.now(),

                    bookingId: this.currentBookingId,

                    data: {

                        bookingId: this.currentBookingId,

                        bookingCode: this.currentBookingCode || 'N/A',

                        exitData: exitData

                    }

                };

                

                console.log('=== SENDING CLEAN NOTIFICATION ===');

                console.log('Notification data:', message);

                

                // Use only one reliable method: BroadcastChannel + localStorage

                try {

                    const channel = new BroadcastChannel('parking_updates');

                    channel.postMessage(message);

                    channel.close();

                    console.log('BroadcastChannel message sent');

                } catch (error) {

                    console.log('BroadcastChannel not supported:', error);

                }

                

                // Single localStorage update (no multiple setTimeouts)

                localStorage.setItem('adminPageUpdate', JSON.stringify(message));

                localStorage.setItem('latestExitData', JSON.stringify(exitData));

                

                console.log('=== NOTIFICATION SENT SUCCESSFULLY ===');

                

                // Clear the notification flag after a delay

                setTimeout(() => {

                    sessionStorage.removeItem(notificationKey);

                }, 5000);

            }



        }
