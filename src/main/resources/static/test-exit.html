<!DOCTYPE html>
<html>
<head>
    <title>Exit Page Test</title>
</head>
<body>
    <h1>Testing Exit Page API</h1>
    <button onclick="testActiveBookings()">Test Active Bookings</button>
    <button onclick="testStatistics()">Test Statistics</button>
    <div id="results"></div>
    
    <script>
        async function testActiveBookings() {
            try {
                const response = await fetch('http://localhost:8081/api/exit/active-bookings', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const bookings = await response.json();
                document.getElementById('results').innerHTML = `
                    <h2>Active Bookings (${bookings.length})</h2>
                    <pre>${JSON.stringify(bookings, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <h2>Error</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        async function testStatistics() {
            try {
                const response = await fetch('http://localhost:8081/api/sync/exit/data', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const stats = await response.json();
                document.getElementById('results').innerHTML = `
                    <h2>Statistics</h2>
                    <pre>Today's Exits: ${stats.todayExits || 0}</pre>
                    <pre>Active Bookings: ${stats.activeBookings || 0}</pre>
                    <pre>Total Revenue: ₹${(stats.totalRevenue || 0).toFixed(2)}</pre>
                    <pre>Full Data:</pre>
                    <pre>${JSON.stringify(stats, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <h2>Error</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
