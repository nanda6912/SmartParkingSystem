# =============================================================================
# Smart Parking System - Development Configuration (Docker)
# =============================================================================

# =============================================================================
# SERVER CONFIGURATION (HTTP for Development)
# =============================================================================
server.port=${SERVER_PORT:8081}
server.ssl.enabled=${SSL_ENABLED:false}

# =============================================================================
# ACTUATOR CONFIGURATION (Separate Port)
# =============================================================================
management.server.port=${ACTUATOR_PORT:8082}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=false

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_parking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Nanda@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# JPA / HIBERNATE (Development - Docker Optimized)
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================================================
# LOGGING (Development - Docker Optimized)
# =============================================================================
logging.level.root=INFO
logging.level.com.smartparking=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# =============================================================================
# FLYWAY MIGRATIONS
# =============================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
# Note: This will be configured programmatically in SecurityConfig
# The allowed origins will be read from CORS_ALLOWED_ORIGINS environment variable

# =============================================================================
# SWAGGER / OPENAPI (Development)
# =============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# =============================================================================
# DEVELOPMENT FEATURES (Disabled in Docker)
# =============================================================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
spring.cache.type=caffeine
spring.cache.cache-names=parking-slots,booking-cache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m
