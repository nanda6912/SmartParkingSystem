# =============================================================================
# Smart Parking System - Development Configuration (Docker)
# =============================================================================

# =============================================================================
# SERVER CONFIGURATION (HTTP for Development)
# =============================================================================
server.port=${SERVER_PORT:8081}
server.ssl.enabled=${SSL_ENABLED:false}

# =============================================================================
# ACTUATOR CONFIGURATION (Separate Port)
# =============================================================================
management.server.port=${ACTUATOR_PORT:8082}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=false

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_parking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Nanda@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# JPA / HIBERNATE (Development - Docker Optimized)
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================================================
# LOGGING (Development - Debug Mode)
# =============================================================================
logging.level.root=INFO
logging.level.com.smartparking=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true

# =============================================================================
# FLYWAY MIGRATIONS
# =============================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
app.cors.allowed-origins=http://localhost:8081,http://127.0.0.1:8081

# =============================================================================
# SWAGGER / OPENAPI (Development)
# =============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =============================================================================
# DEVELOPMENT FEATURES
# =============================================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/resources/static

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
spring.cache.type=caffeine
spring.cache.cache-names=parking-slots,booking-cache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m
