# =============================================================================
# Smart Parking System - Production Configuration
# =============================================================================
# This is a TEMPLATE configuration file. All sensitive values must be provided
# via environment variables or external secrets manager.
# 
# Required Environment Variables:
# - DB_PASSWORD: Database password
# - PARKING_API_KEY: API key for authentication
# - SSL_KEYSTORE_PASSWORD: SSL keystore password
# - SSL_KEY_PASSWORD: SSL key password (if different from keystore)
# =============================================================================

# =============================================================================
# SERVER CONFIGURATION (HTTPS Enabled)
# =============================================================================
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:smartparking}

# HTTP to HTTPS redirect (optional - requires additional configuration)
# server.http.port=8080

# =============================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# =============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_parking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Production Optimized
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_THRESHOLD:60000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.connection-test-query=SELECT 1

# =============================================================================
# JPA / HIBERNATE - VALIDATION MODE (No DDL Changes)
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================================================
# FLYWAY MIGRATIONS
# =============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=false

# =============================================================================
# LOGGING - Production (INFO level, structured JSON)
# =============================================================================
logging.level.root=WARN
logging.level.com.smartparking=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

# Logback configuration file reference
logging.config=classpath:logback-spring.xml

# =============================================================================
# SECURITY - API Key (MUST be provided via environment variable)
# =============================================================================
parking.api.key=${PARKING_API_KEY}

# Session and security settings
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# =============================================================================
# CORS - Production (Restrictive)
# =============================================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://localhost:8443}

# =============================================================================
# ACTUATOR - Limited Exposure
# =============================================================================
management.server.port=${ACTUATOR_PORT:8444}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.exposure.exclude=env,beans,threaddump,heapdump,configprops,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Health indicators
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.ping.enabled=true

# =============================================================================
# FILE UPLOAD LIMITS
# =============================================================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=${MULTIPART_THRESHOLD:2MB}

# =============================================================================
# RATE LIMITING - Production Values
# =============================================================================
rate.limit.lock.requests=${RATE_LIMIT_LOCK:5}
rate.limit.book.requests=${RATE_LIMIT_BOOK:3}
rate.limit.view.requests=${RATE_LIMIT_VIEW:30}
rate.limit.receipt.requests=${RATE_LIMIT_RECEIPT:10}
rate.limit.general.requests=${RATE_LIMIT_GENERAL:60}
rate.limit.cleanup.interval=${RATE_CLEANUP_INTERVAL:300000}
rate.limit.bucket.ttl=${RATE_BUCKET_TTL:3600000}

# =============================================================================
# CACHE - Production (Enabled)
# =============================================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# =============================================================================
# METRICS & OBSERVABILITY
# =============================================================================
management.metrics.tags.application=smart-parking-system
management.metrics.tags.environment=${ENVIRONMENT:production}
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=50ms,100ms,200ms,500ms,1s,5s

# =============================================================================
# SWAGGER / OPENAPI - Disabled in Production
# =============================================================================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# =============================================================================
# DEVTOOLS - Disabled in Production
# =============================================================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# =============================================================================
# JACKSON - Secure Defaults
# =============================================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.date-format=yyyy-MM-dd'T'HH:mm:ss
